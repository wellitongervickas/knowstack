name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to KnowStack.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered and why they're less suitable
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of KnowStack does this affect?
      options:
        - API Endpoints
        - Authentication / Authorization
        - Document Ingestion
        - Query / Search
        - MCP Integration
        - Configuration / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, references, related issues
    validations:
      required: false
