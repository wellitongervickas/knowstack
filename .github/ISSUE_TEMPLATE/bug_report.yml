name: Bug Report
description: Report a bug in KnowStack API
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Send POST to /api/v1/...
        2. With payload...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages, status codes)
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Local development (pnpm start:dev)
        - Docker Compose
        - Custom deployment
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Version number or commit SHA
      placeholder: "e.g., v1.0.0 or abc1234"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js version, OS, database version
      placeholder: |
        - Node.js: 20.x
        - OS: Ubuntu 22.04
        - PostgreSQL: 16
        - Redis: 7
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output
      render: shell
    validations:
      required: false
